name: Integration HTTP Demo (Windows)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  appfs-agent-http-demo:
    name: appfs + appfs-agent http demo
    runs-on:
      - self-hosted
      - windows
      - winfsp
    env:
      CHECKOUT_PATH: repo-${{ github.run_id }}-http-demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          clean: false
          path: ${{ env.CHECKOUT_PATH }}

      - name: Clean stale self-hosted state
        shell: powershell
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          Get-CimInstance Win32_Process |
            Where-Object {
              $_.Name -in @('agentfs.exe', 'claw.exe') -and
              $_.CommandLine -like "*$workspace*"
            } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }

          Get-CimInstance Win32_Process |
            Where-Object {
              $_.Name -eq 'python.exe' -and
              $_.CommandLine -like '*bridge_server.py*'
            } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }

          Start-Sleep -Seconds 1
          foreach ($path in @('C:\mnt\appfs-agent-smoke', 'C:\mnt\appfs-agent-http-demo')) {
            if (Test-Path $path) {
              cmd /c "rmdir /s /q `"$path`"" 2>$null | Out-Null
            }
          }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ env.CHECKOUT_PATH }}/appfs/cli
            ${{ env.CHECKOUT_PATH }}/appfs-agent/rust

      - name: Run HTTP demo integration smoke test
        shell: powershell
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          Set-Location (Join-Path $env:GITHUB_WORKSPACE $env:CHECKOUT_PATH)
          ./integration/scripts/test-windows-appfs-agent-http-demo.ps1
