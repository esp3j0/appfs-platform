name: Integration Smoke (Windows)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_prompt:
        description: "Also run a real appfs-agent prompt against the mounted workspace"
        required: false
        type: boolean
        default: false

jobs:
  appfs-agent-windows-smoke:
    name: appfs + appfs-agent smoke
    runs-on:
      - self-hosted
      - windows
      - winfsp

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clean stale self-hosted state
        shell: powershell
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          Get-CimInstance Win32_Process |
            Where-Object {
              $_.Name -in @('agentfs.exe', 'claw.exe') -and
              $_.CommandLine -like "*$workspace*"
            } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }

          Get-CimInstance Win32_Process |
            Where-Object {
              $_.Name -eq 'python.exe' -and
              $_.CommandLine -like '*bridge_server.py*'
            } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }

          Start-Sleep -Seconds 1
          foreach ($path in @('C:\mnt\appfs-agent-smoke', 'C:\mnt\appfs-agent-http-demo')) {
            if (Test-Path $path) {
              cmd /c "rmdir /s /q `"$path`"" 2>$null | Out-Null
            }
          }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            appfs/cli
            appfs-agent/rust

      - name: Run Windows smoke test
        shell: powershell
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          $args = @()
          if ("${{ inputs.run_prompt }}" -eq "true") {
            $args += "-RunPrompt"
          }
          ./integration/scripts/test-windows-appfs-agent-smoke.ps1 @args
