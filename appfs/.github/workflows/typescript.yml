name: TypeScript CI

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, closed]

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.action != 'closed' || github.event.pull_request.merged == true
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: sdk/typescript/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Test
      run: npm test

  test-browser:
    if: github.event_name != 'pull_request' || github.event.action != 'closed' || github.event.pull_request.merged == true
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [22]
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: sdk/typescript/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Install playwright
      run: npx playwright install

    - name: Test
      run: npm run test:browser

  check:
    if: github.event_name != 'pull_request' || github.event.action != 'closed' || github.event.pull_request.merged == true
    name: Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: sdk/typescript/package-lock.json

    - name: Install dependencies
      run: npm ci

  examples:
    if: github.event_name != 'pull_request' || github.event.action != 'closed' || github.event.pull_request.merged == true
    name: Test Examples
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Build SDK
      working-directory: sdk/typescript
      run: |
        npm ci
        npm run build

    - name: Test Mastra Example
      working-directory: examples/mastra/research-assistant
      run: |
        npm ci
        npm run build

    - name: Test Claude Agent SDK Example
      working-directory: examples/claude-agent/research-assistant
      run: |
        npm ci
        npm run build

    - name: Test OpenAI Agents Example
      working-directory: examples/openai-agents/research-assistant
      run: |
        npm ci
        npm run build

    - name: Test AI SDK Example
      working-directory: examples/ai-sdk-just-bash
      run: |
        npm ci
        npm run typecheck

    - name: Test Cloudflare Example
      working-directory: examples/cloudflare
      run: |
        npm ci
        npm run typecheck
