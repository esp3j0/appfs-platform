syntax = "proto3";

package appfs.connector;

message ConnectorContext {
  string app_id = 1;
  string session_id = 2;
  string request_id = 3;
  optional string client_token = 4;
  optional string trace_id = 5;
}

enum ConnectorTransport {
  CONNECTOR_TRANSPORT_UNSPECIFIED = 0;
  CONNECTOR_TRANSPORT_IN_PROCESS = 1;
  CONNECTOR_TRANSPORT_HTTP_BRIDGE = 2;
  CONNECTOR_TRANSPORT_GRPC_BRIDGE = 3;
}

message ConnectorInfo {
  string connector_id = 1;
  string version = 2;
  string app_id = 3;
  ConnectorTransport transport = 4;
  bool supports_snapshot = 5;
  bool supports_live = 6;
  bool supports_action = 7;
  repeated string optional_features = 8;
}

enum AuthStatus {
  AUTH_STATUS_UNSPECIFIED = 0;
  AUTH_STATUS_VALID = 1;
  AUTH_STATUS_EXPIRED = 2;
  AUTH_STATUS_REFRESHING = 3;
  AUTH_STATUS_INVALID = 4;
}

message HealthStatus {
  bool healthy = 1;
  AuthStatus auth_status = 2;
  optional string message = 3;
  string checked_at = 4;
}

message SnapshotMeta {
  optional uint64 size_bytes = 1;
  optional string revision = 2;
  optional string last_modified = 3;
  optional uint64 item_count = 4;
}

message SnapshotResume {
  oneof kind {
    bool start = 1;
    string cursor = 2;
    uint64 offset = 3;
  }
}

message SnapshotChunkRequest {
  string resource_path = 1;
  SnapshotResume resume = 2;
  uint64 budget_bytes = 3;
}

message SnapshotRecord {
  string record_key = 1;
  string ordering_key = 2;
  string line_json = 3;
}

message SnapshotChunkResponse {
  repeated SnapshotRecord records = 1;
  uint64 emitted_bytes = 2;
  optional string next_cursor = 3;
  bool has_more = 4;
  optional string revision = 5;
}

message LivePageRequest {
  string resource_path = 1;
  optional string handle_id = 2;
  optional string cursor = 3;
  uint32 page_size = 4;
}

enum LiveMode {
  LIVE_MODE_UNSPECIFIED = 0;
  LIVE_MODE_LIVE = 1;
}

message LivePageInfo {
  string handle_id = 1;
  uint32 page_no = 2;
  bool has_more = 3;
  LiveMode mode = 4;
  optional string expires_at = 5;
  optional string next_cursor = 6;
  optional uint32 retry_after_ms = 7;
}

message LivePageResponse {
  repeated string items_json = 1;
  LivePageInfo page = 2;
}

enum ActionExecutionMode {
  ACTION_EXECUTION_MODE_UNSPECIFIED = 0;
  ACTION_EXECUTION_MODE_INLINE = 1;
  ACTION_EXECUTION_MODE_STREAMING = 2;
}

message SubmitActionInput {
  string path = 1;
  string payload_json = 2;
  ActionExecutionMode execution_mode = 3;
}

message ActionStreamingPlan {
  string accepted_content_json = 1;
  string progress_content_json = 2;
  string terminal_content_json = 3;
  bool has_accepted_content = 4;
  bool has_progress_content = 5;
}

message SubmitActionOutcome {
  oneof kind {
    string completed_content_json = 1;
    ActionStreamingPlan streaming_plan = 2;
  }
}

message SubmitActionOutput {
  string request_id = 1;
  optional uint32 estimated_duration_ms = 2;
  SubmitActionOutcome outcome = 3;
}

message ConnectorError {
  string code = 1;
  string message = 2;
  bool retryable = 3;
  optional string details = 4;
}

message GetConnectorInfoRequest {}

message GetConnectorInfoResponse {
  oneof result {
    ConnectorInfo info = 1;
    ConnectorError error = 2;
  }
}

message HealthRequest {
  ConnectorContext context = 1;
}

message HealthResponse {
  oneof result {
    HealthStatus status = 1;
    ConnectorError error = 2;
  }
}

message PrewarmSnapshotMetaRequest {
  ConnectorContext context = 1;
  string resource_path = 2;
  uint64 timeout_ms = 3;
}

message PrewarmSnapshotMetaResponse {
  oneof result {
    SnapshotMeta meta = 1;
    ConnectorError error = 2;
  }
}

message FetchSnapshotChunkRequest {
  ConnectorContext context = 1;
  SnapshotChunkRequest request = 2;
}

message FetchSnapshotChunkResponse {
  oneof result {
    SnapshotChunkResponse response = 1;
    ConnectorError error = 2;
  }
}

message FetchLivePageRequest {
  ConnectorContext context = 1;
  LivePageRequest request = 2;
}

message FetchLivePageResponse {
  oneof result {
    LivePageResponse response = 1;
    ConnectorError error = 2;
  }
}

message SubmitActionRequest {
  ConnectorContext context = 1;
  SubmitActionInput request = 2;
}

message SubmitActionResponse {
  oneof result {
    SubmitActionOutput response = 1;
    ConnectorError error = 2;
  }
}

service AppfsConnector {
  rpc GetConnectorInfo(GetConnectorInfoRequest) returns (GetConnectorInfoResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc PrewarmSnapshotMeta(PrewarmSnapshotMetaRequest) returns (PrewarmSnapshotMetaResponse);
  rpc FetchSnapshotChunk(FetchSnapshotChunkRequest) returns (FetchSnapshotChunkResponse);
  rpc FetchLivePage(FetchLivePageRequest) returns (FetchLivePageResponse);
  rpc SubmitAction(SubmitActionRequest) returns (SubmitActionResponse);
}
